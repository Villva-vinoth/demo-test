name: Node.js CI

on:
  push:
    branches:
      - vinoth

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: package installation
        run: npm install

      - name: build
        run: npm run build

      - name: test
        run: npm run test

      - name: complete print
        run: echo " completed successfully!"

      - name: "start pana poren"
        run: npm start
      - name: deploy
        run: echo " deployment completed successfully!"
